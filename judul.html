<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Judul - Joyvite</title>
    
    <meta name="robots" content="noindex, nofollow">
    <link href="node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="node_modules/animate.css/animate.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="sidebar">
        <!-- Reusing Sidebar from template -->
        <div class="sidebar-header">
            <i class="fa-solid fa-envelope-open-text" style="color: var(--primary-color); font-size: 1.5rem;"></i>
            <h4>Joyvite</h4>
        </div>
        <ul class="nav flex-column mt-2">
            <li class="nav-item"><a class="nav-link" href="#"><i class="fa-solid fa-house me-3"></i> Beranda</a></li>
            <li class="nav-item"><a class="nav-link active" href="index"><i class="fa-solid fa-gear me-3"></i> Pengaturan</a></li>
            <li class="nav-item"><a class="nav-link" href="#"><i class="fa-regular fa-paper-plane me-3"></i> Kirim Undangan</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="topbar">
            <button class="btn d-lg-none" id="mobileMenuToggle"><i class="fa-solid fa-bars"></i></button>
            <div class="user-profile ms-auto">
                <span class="name">Rei za</span>
                <div class="avatar-wrapper"><img src="https://ui-avatars.com/api/?name=Rei+Za&background=random" alt="Avatar User"><div class="status-dot"></div></div>
            </div>
        </div>

        <div class="content-header px-4 pt-4 pb-0">
            <h2 class="content-header-title" style="font-weight:700">Pengaturan Judul</h2>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index" class="text-muted text-decoration-none">Pengaturan</a></li>
                    <li class="breadcrumb-item active text-primary" aria-current="page">Judul</li>
                </ol>
            </nav>
        </div>

        <div class="content-body px-4 pb-5">
            <form id="wedding-form" action="#" method="POST">
                
                <!-- CARD MEMPELAI -->
                <div class="card shadow-sm border-0 rounded-3 mb-4">
                    <div class="card-body p-4">
                        <h4 class="card-title fw-bold mb-4">Bagian Mempelai</h4>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Judul Mempelai</label>
                                <input type="text" class="form-control bg-light" value="Mempelai">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Judul Ayah</label>
                                <input type="text" class="form-control bg-light" value="Bapak">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Judul Ibu</label>
                                <input type="text" class="form-control bg-light" value="Ibu">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Judul Pemisah</label>
                                <input type="text" class="form-control bg-light" value="dari">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- CARD COVER -->
                <div class="card shadow-sm border-0 rounded-3 mb-4">
                    <div class="card-body p-4">
                        <h4 class="card-title fw-bold mb-4">Bagian Cover</h4>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Judul Cover</label>
                                <input type="text" class="form-control bg-light" name="judul_cover" value="Pernikahan">
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- CARD COUNTDOWN -->
                <div class="card shadow-sm border-0 rounded-3 mb-4">
                    <div class="card-body p-4">
                        <h4 class="card-title fw-bold mb-4">Bagian Hitung Mundur</h4>
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Judul Hitung Mundur</label>
                                <input type="text" class="form-control bg-light" name="judul_countdown" value="Menghitung Hari">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Hari</label>
                                <input type="text" class="form-control bg-light" name="judul_label_hari" value="Hari">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Jam</label>
                                <input type="text" class="form-control bg-light" name="judul_label_jam" value="Jam">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Menit</label>
                                <input type="text" class="form-control bg-light" name="judul_label_menit" value="Menit">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Detik</label>
                                <input type="text" class="form-control bg-light" name="judul_label_detik" value="Detik">
                            </div>
                        </div>
                    </div>
                </div>

                <button class="btn w-100 rounded-pill py-3 shadow-sm text-white mt-3" style="background-color: var(--primary-dark); font-weight: 600;" type="submit">
                    Simpan Pengaturan Judul <i class="fa-solid fa-save ms-2"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="node_modules/jquery/dist/jquery.min.js"></script>
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js?v=2"></script>
</body>
</html>
