<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup Undangan - Joyvite</title>
    
    <meta name="robots" content="noindex, nofollow">
    <link href="node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="node_modules/animate.css/animate.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-envelope-open-text" style="color: var(--primary-color); font-size: 1.5rem;"></i>
            <h4>Joyvite</h4>
        </div>
        <ul class="nav flex-column mt-2">
            <li class="nav-item"><a class="nav-link" href="#"><i class="fa-solid fa-house me-3"></i> Beranda</a></li>
            <li class="nav-item"><a class="nav-link active" href="index"><i class="fa-solid fa-gear me-3"></i> Pengaturan</a></li>
            <li class="nav-item"><a class="nav-link" href="#"><i class="fa-regular fa-paper-plane me-3"></i> Kirim Undangan</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="topbar">
            <button class="btn d-lg-none" id="mobileMenuToggle"><i class="fa-solid fa-bars"></i></button>
            <div class="user-profile ms-auto">
                <span class="name">Rei za</span>
                <div class="avatar-wrapper"><img src="https://ui-avatars.com/api/?name=Rei+Za&background=random" alt="Avatar User"><div class="status-dot"></div></div>
            </div>
        </div>

        <div class="content-header px-4 pt-4 pb-0">
            <h2 class="content-header-title fw-bold">Sapaan Awal (Popup)</h2>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index" class="text-muted text-decoration-none">Pengaturan</a></li>
                    <li class="breadcrumb-item active text-primary">Invitation Popup</li>
                </ol>
            </nav>
        </div>

        <div class="content-body px-4 pb-5">
            <form id="wedding-form" action="#" method="POST">
                
                <div class="card shadow-sm border-0 rounded-3 mb-4">
                    <div class="card-body p-4">
                        <div class="row g-4">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Pesan Kalimat Pembuka</label>
                                <textarea name="popup_message" class="form-control bg-light" rows="3" placeholder="Kepada Yth. Bapak/Ibu/Saudara/i"></textarea>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Teks Tombol Buka Undangan</label>
                                <input type="text" name="popup_btn_text" class="form-control bg-light" value="Buka Undangan">
                            </div>
                        </div>

                        <!-- Toggle -->
                        <div class="d-flex justify-content-between align-items-center mt-4">
                            <div>
                                <h6 class="fw-bold mb-1">Tampilkan Popup Ini</h6>
                                <p class="text-muted small mb-0">Jika dimatikan, halaman akan langsung loncat ke undangan utama tanpa menanyakan ketukan layar.</p>
                            </div>
                            <div class="form-check form-switch fs-5">
                                <input class="form-check-input" type="checkbox" role="switch" checked>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="btn w-100 rounded-pill py-3 shadow-sm text-white" style="background-color: var(--primary-dark); font-weight: 600;" type="submit">
                    Simpan Perubahan Popup <i class="fa-solid fa-save ms-2"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="node_modules/jquery/dist/jquery.min.js"></script>
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js?v=3"></script>
</body>
</html>
