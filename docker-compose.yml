version: '3.8'

services:
  joyvite-postgres:
    image: postgres:15-alpine
    container_name: joyvite-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: JoyvitePassword123!
      POSTGRES_DB: joyvitedb
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
